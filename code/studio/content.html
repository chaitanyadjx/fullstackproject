<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Studio Content</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Nav --- */
        .studio-nav {
            background: var(--black);
            color: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
        }
        .brand span { color: var(--brand-orange); }

        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #ccc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-link:hover { color: var(--white); }

        /* --- Layout --- */
        .layout-container {
            display: flex;
            flex: 1;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 250px;
            background: var(--white);
            border-right: var(--border-thick);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--black);
            font-weight: 700;
            border-radius: 8px;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .side-link:hover {
            background: #eee;
        }
        .side-link.active {
            background: var(--brand-orange);
            color: var(--white);
            border: 2px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2.5rem;
        }

        .btn-action {
            background: var(--brand-orange);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
            transition: 0.2s;
        }
        .btn-action:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--black);
        }

        /* --- Tabs --- */
        .filter-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            padding-bottom: 10px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: var(--black);
            border-color: var(--brand-orange);
        }

        /* --- Table --- */
        .content-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #ccc;
        }
        
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        th {
            background: #eee;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        tr:last-child td { border-bottom: none; }

        .video-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .vid-thumb {
            width: 120px;
            height: 68px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .vid-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .vid-title { font-weight: 700; font-size: 0.95rem; }
        .vid-desc { font-size: 0.8rem; color: #666; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .status-live { background: #ffcccc; color: #cc0000; }
        .status-draft { background: #e2e8f0; color: #475569; }
        .status-published { background: #dcfce7; color: #166534; }

        .btn-icon {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-icon:hover { background: #eee; }

    </style>
</head>
<body>

    <nav class="studio-nav">
        <a href="dashboard.html" class="brand">VERTO <span>STUDIO</span></a>
        <div class="nav-right">
            <a href="../discovery/station.html" class="nav-link"><i data-lucide="external-link" size="18"></i> View Station</a>
            <div style="width: 32px; height: 32px; background: #333; border-radius: 50%; border: 1px solid #555; overflow: hidden;">
                 <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=100" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>
    </nav>

    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="side-link">
                <i data-lucide="layout-dashboard" size="20"></i> Dashboard
            </a>
            <a href="content.html" class="side-link active">
                <i data-lucide="video" size="20"></i> Content
            </a>
            <a href="schedule.html" class="side-link">
                <i data-lucide="calendar" size="20"></i> Schedule
            </a>
            <a href="community.html" class="side-link">
                <i data-lucide="users" size="20"></i> Community
            </a>
            <a href="tiers.html" class="side-link">
                <i data-lucide="star" size="20"></i> Tiers
            </a>
            <a href="payouts.html" class="side-link">
                <i data-lucide="dollar-sign" size="20"></i> Payouts
            </a>
            <div style="flex:1;"></div>
            <a href="settings.html" class="side-link">
                <i data-lucide="settings" size="20"></i> Settings
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            
            <div class="header-row">
                <h1>Content Library</h1>
                <a href="upload.html" class="btn-action"><i data-lucide="upload-cloud" size="18"></i> Upload Video</a>
            </div>

            <div class="filter-tabs">
                <div class="tab active">All Videos</div>
                <div class="tab">Live Replays</div>
                <div class="tab">Shorts</div>
                <div class="tab">Drafts</div>
            </div>

            <table class="content-table">
                <thead>
                    <tr>
                        <th style="width: 40%">Video</th>
                        <th>Visibility</th>
                        <th>Date</th>
                        <th>Views</th>
                        <th>Comments</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="video-tbody">
                    <tr><td colspan="6" style="color:#999;">Loading videos...</td></tr>
                </tbody>
            </table>

        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        lucide.createIcons();
        if (!auth.requireRole('creator', 'admin')) throw 'redirect';

        const defaultThumb = 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=200';
        let currentFilter = '';

        async function loadVideos(filter) {
            const q = filter === 'drafts' ? '?filter=drafts' : '';
            try {
                const res = await api.get(`/videos/mine${q}`);
                const videos = res.data || [];
                const tbody = document.getElementById('video-tbody');
                if (!videos.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="color:#999;">No videos found</td></tr>';
                    return;
                }
                tbody.innerHTML = videos.map(v => `
                    <tr>
                        <td>
                            <div class="video-cell">
                                <div class="vid-thumb"><img src="${v.thumbnailUrl || defaultThumb}"></div>
                                <div>
                                    <div class="vid-title">${v.title}</div>
                                    <div class="vid-desc">${v.description || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="status-badge status-${v.status === 'ready' ? 'published' : 'draft'}">${v.visibility || v.status}</span></td>
                        <td>${formatDate(v.createdAt)}</td>
                        <td>${formatNumber(v.viewCount)}</td>
                        <td>${v.commentCount || 0}</td>
                        <td>
                            <button class="btn-icon" onclick="deleteVideo('${v._id}')"><i data-lucide="trash-2" size="18"></i></button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) { showToast('Could not load videos', 'error'); }
        }

        async function deleteVideo(id) {
            if (!confirm('Delete this video?')) return;
            try {
                await api.del(`/videos/${id}`);
                showToast('Video deleted', 'success');
                loadVideos(currentFilter);
            } catch (err) { showToast(err.message, 'error'); }
        }

        // Tab filtering
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.textContent.trim().toLowerCase() === 'drafts' ? 'drafts' : '';
                loadVideos(currentFilter);
            });
        });

        loadVideos();
    </script>
</body>
</html>
