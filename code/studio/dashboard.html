<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Studio Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Nav --- */
        .studio-nav {
            background: var(--black);
            color: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
        }
        .brand span { color: var(--brand-orange); }

        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #ccc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-link:hover { color: var(--white); }

        /* --- Layout --- */
        .layout-container {
            display: flex;
            flex: 1;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 250px;
            background: var(--white);
            border-right: var(--border-thick);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--black);
            font-weight: 700;
            border-radius: 8px;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .side-link:hover {
            background: #eee;
        }
        .side-link.active {
            background: var(--brand-orange);
            color: var(--white);
            border: 2px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        h1 {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-delta {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .positive { color: #00aa00; }
        .negative { color: #cc0000; }

        /* --- Recent Activity --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .activity-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #ccc;
        }
        
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #eee;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        tr:last-child td { border-bottom: none; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .status-live { background: #ffcccc; color: #cc0000; }
        .status-scheduled { background: #e0f2fe; color: #0284c7; }
        .status-published { background: #dcfce7; color: #166534; }

    </style>
</head>
<body>

    <nav class="studio-nav">
        <a href="dashboard.html" class="brand">VERTO <span>STUDIO</span></a>
        
        <div class="nav-right">
            <a href="../discovery/station.html" class="nav-link"><i data-lucide="external-link" size="18"></i> View Station</a>
            <div style="width: 32px; height: 32px; background: #333; border-radius: 50%; border: 1px solid #555; overflow: hidden;">
                 <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=100" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>
    </nav>

    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="side-link active">
                <i data-lucide="layout-dashboard" size="20"></i> Dashboard
            </a>
            <a href="content.html" class="side-link">
                <i data-lucide="video" size="20"></i> Content
            </a>
            <a href="schedule.html" class="side-link">
                <i data-lucide="calendar" size="20"></i> Schedule
            </a>
            <a href="community.html" class="side-link">
                <i data-lucide="users" size="20"></i> Community
            </a>
            <a href="tiers.html" class="side-link">
                <i data-lucide="star" size="20"></i> Tiers
            </a>
            <a href="payouts.html" class="side-link">
                <i data-lucide="dollar-sign" size="20"></i> Payouts
            </a>
            <div style="flex:1;"></div>
            <a href="settings.html" class="side-link">
                <i data-lucide="settings" size="20"></i> Settings
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h1>Channel Overview</h1>

            <!-- Metrics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Revenue (30d)</div>
                    <div class="stat-value" id="stat-revenue">$0</div>
                    <div class="stat-delta" id="stat-revenue-delta"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Subscribers</div>
                    <div class="stat-value" id="stat-subs">0</div>
                    <div class="stat-delta" id="stat-subs-delta"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Watch Time (Hours)</div>
                    <div class="stat-value" id="stat-watch">0</div>
                    <div class="stat-delta" id="stat-watch-delta"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg. Retention</div>
                    <div class="stat-value" id="stat-retention">0%</div>
                    <div class="stat-delta"><i data-lucide="minus" size="16"></i> Stable</div>
                </div>
            </div>

            <div class="section-header">
                <h3>Recent Uploads</h3>
                <a href="content.html" style="color:var(--brand-orange); font-weight:700; text-decoration:none;">View All</a>
            </div>

            <table class="activity-table">
                <thead>
                    <tr>
                        <th>Video Title</th>
                        <th>Date</th>
                        <th>Views</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recent-uploads">
                    <tr><td colspan="4" style="color:#999;">Loading...</td></tr>
                </tbody>
            </table>

        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        lucide.createIcons();
        if (!auth.requireRole('creator', 'admin')) throw 'redirect';

        async function loadDashboard() {
            try {
                const res = await api.get('/studio/me/stats');
                const s = res.data;
                document.getElementById('stat-revenue').textContent = '$' + (s.revenue30d || 0).toLocaleString();
                document.getElementById('stat-revenue-delta').innerHTML = `<i data-lucide="arrow-up-right" size="16"></i> ${s.revenueChange || 0}% vs last month`;
                document.getElementById('stat-subs').textContent = formatNumber(s.activeSubscribers || 0);
                document.getElementById('stat-subs-delta').innerHTML = `<i data-lucide="arrow-up-right" size="16"></i> ${s.newSubscribers || 0} new`;
                document.getElementById('stat-watch').textContent = formatNumber(s.watchTimeHours || 0);
                document.getElementById('stat-retention').textContent = (s.avgRetentionPct || 0) + '%';

                // Recent uploads table
                const uploads = s.recentUploads || [];
                const tbody = document.getElementById('recent-uploads');
                if (uploads.length) {
                    tbody.innerHTML = uploads.map(v => `
                        <tr>
                            <td>${v.title}</td>
                            <td>${formatDate(v.createdAt)}</td>
                            <td>${formatNumber(v.viewCount)}</td>
                            <td><span class="status-badge status-${v.status === 'ready' ? 'published' : v.status}">${v.status}</span></td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="color:#999;">No uploads yet</td></tr>';
                }
                lucide.createIcons();
            } catch (err) { showToast('Could not load dashboard', 'error'); }
        }

        // Logout link
        document.querySelectorAll('a[href*="sign-in"], .side-link').forEach(l => {
            if (l.textContent.includes('Logout') || l.textContent.includes('Sign Out')) {
                l.addEventListener('click', (e) => { e.preventDefault(); auth.logout(); });
            }
        });

        loadDashboard();
    </script>
</body>
</html>
