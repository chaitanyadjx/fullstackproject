<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Studio Settings</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Nav --- */
        .studio-nav {
            background: var(--black);
            color: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
        }
        .brand span { color: var(--brand-orange); }

        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #ccc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-link:hover { color: var(--white); }

        /* --- Layout --- */
        .layout-container {
            display: flex;
            flex: 1;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 250px;
            background: var(--white);
            border-right: var(--border-thick);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--black);
            font-weight: 700;
            border-radius: 8px;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .side-link:hover {
            background: #eee;
        }
        .side-link.active {
            background: var(--brand-orange);
            color: var(--white);
            border: 2px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        h1 {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .section-card {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0px #ccc;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 25px;
            align-items: start;
        }
        
        label { font-weight: 700; color: #555; display: block; margin-top: 10px; }
        .help-text { font-size: 0.8rem; color: #888; margin-top: 5px; }

        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--black); outline: none; }

        .avatar-area {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .current-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            overflow: hidden;
            background: #333;
            border: 2px solid var(--black);
        }
        .current-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .btn-outline {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: #fff;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .stream-key-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }
        .hidden-key { filter: blur(4px); transition: 0.2s; user-select: none; }
        .hidden-key:hover { filter: none; }

        .btn-save {
            background: var(--brand-orange);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            transition: 0.2s;
        }
        .btn-save:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--black);
        }

    </style>
</head>
<body>

    <nav class="studio-nav">
        <a href="dashboard.html" class="brand">VERTO <span>STUDIO</span></a>
        <div class="nav-right">
            <a href="../discovery/station.html" class="nav-link"><i data-lucide="external-link" size="18"></i> View Station</a>
            <div style="width: 32px; height: 32px; background: #333; border-radius: 50%; border: 1px solid #555; overflow: hidden;">
                 <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=100" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>
    </nav>

    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="side-link">
                <i data-lucide="layout-dashboard" size="20"></i> Dashboard
            </a>
            <a href="content.html" class="side-link">
                <i data-lucide="video" size="20"></i> Content
            </a>
            <a href="schedule.html" class="side-link">
                <i data-lucide="calendar" size="20"></i> Schedule
            </a>
            <a href="community.html" class="side-link">
                <i data-lucide="users" size="20"></i> Community
            </a>
            <a href="tiers.html" class="side-link">
                <i data-lucide="star" size="20"></i> Tiers
            </a>
            <a href="payouts.html" class="side-link">
                <i data-lucide="dollar-sign" size="20"></i> Payouts
            </a>
            <div style="flex:1;"></div>
            <a href="settings.html" class="side-link active">
                <i data-lucide="settings" size="20"></i> Settings
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            
            <h1>Settings</h1>

            <div class="section-card">
                <div class="section-title">Profile</div>
                
                <div class="form-row">
                    <label>Avatar</label>
                    <div class="avatar-area">
                        <div class="current-avatar">
                            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=100">
                        </div>
                        <div>
                            <button class="btn-outline">Change Image</button>
                            <div class="help-text">Recommended 800x800 px</div>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Display Name</label>
                    <input type="text" value="RetroTech">
                </div>

                <div class="form-row">
                    <label>Bio</label>
                    <textarea rows="4">Exploring the history of computing, one restoration at a time. I fix old macs, consoles, and obscure hardware.</textarea>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title">Stream Configuration</div>
                
                <div class="form-row">
                    <div>
                        <label>Stream Key</label>
                        <div class="help-text">Keep this secret! Do not share it.</div>
                    </div>
                    <div class="stream-key-box">
                        <span class="hidden-key">live_pk_19283012_xJ9201L0212</span>
                        <button class="btn-outline" style="border:none;">Copy</button>
                    </div>
                </div>

                <div class="form-row">
                    <label>Ingest Server</label>
                    <input type="text" value="rtmp://live.verto.tv/app" readonly style="background: #f9f9f9; color: #666;">
                </div>
            </div>

            <div style="text-align: right;">
                <button class="btn-save">Save Changes</button>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
