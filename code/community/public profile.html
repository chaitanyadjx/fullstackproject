<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Profile</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
        }

        /* --- Nav --- */
        .nav-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            padding: 0 5%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 100px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--black);
            text-decoration: none;
            letter-spacing: -2px;
        }
        .brand span { color: var(--brand-orange); }

        .nav-menu {
            display: flex;
            gap: 30px;
            font-weight: 700;
        }
        
        .nav-link {
            text-decoration: none;
            color: var(--black);
            font-size: 1rem;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
        }

        /* --- Profile Layout --- */
        .profile-container {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 5%;
            text-align: center;
        }

        .profile-card {
            background: var(--white);
            border: var(--border-thick);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 10px 10px 0px var(--black);
            position: relative;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            background: #eee;
            border-radius: 50%;
            border: 4px solid var(--black);
            margin: 0 auto 30px auto;
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-name {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2.5rem;
            margin-bottom: 10px;
            line-height: 1;
        }
        
        .profile-join {
            color: #666;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .profile-bio {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Badges --- */
        .badges-section {
            border-top: 2px solid #eee;
            padding-top: 30px;
        }
        .badges-section h3 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #888;
        }

        .badge-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .badge {
            background: var(--soft-gray);
            border: 2px solid var(--black);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge.gold {
            background: #FFD700;
            color: var(--black);
        }
        
        .top-supporter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--brand-orange);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 2px solid var(--black);
            transform: rotate(5deg);
        }

    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <a href="../../index.html" class="brand">VERTO<span>.</span></a>
            <div class="nav-menu">
                <a href="community.html" class="nav-link">Feed</a>
                <a href="perks.html" class="nav-link">Perks</a>
                <a href="../discovery/browse.html" class="nav-link">Discover</a>
            </div>
            <div class="nav-user">
                <a href="../billing/settings.html" style="color:var(--black); text-decoration:none; font-weight:700;">Account</a>
            </div>
        </nav>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            
            <div class="top-supporter">Top Supporter</div>

            <div class="profile-avatar">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=300" alt="Sarah Jenkins">
            </div>

            <h1 class="profile-name">Sarah Jenkins</h1>
            <p class="profile-join">Member since March 2024</p>

            <p class="profile-bio">
                Synth enthusiast and modular geek. I make noise in my basement and sometimes call it music.
            </p>

            <div class="badges-section">
                <h3>Badges</h3>
                <div class="badge-grid">
                    <div class="badge gold">
                        <i data-lucide="star" size="16"></i> Founder
                    </div>
                    <div class="badge">
                        <i data-lucide="music" size="16"></i> Music Lab T3
                    </div>
                    <div class="badge">
                        <i data-lucide="code" size="16"></i> Verified Dev
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
