<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Retro Tech Station</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
        }

        /* --- Nav --- */
        .nav-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            padding: 0 5%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 100px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--black);
            text-decoration: none;
            letter-spacing: -2px;
        }
        .brand span { color: var(--brand-orange); }

        .nav-menu {
            display: flex;
            gap: 30px;
            font-weight: 700;
        }
        
        .nav-link {
            text-decoration: none;
            color: var(--black);
            font-size: 1rem;
        }
        .nav-link:hover { color: var(--brand-orange); }

        /* --- Station Hero --- */
        .station-header {
            background: var(--white);
            border-bottom: var(--border-thick);
            padding-bottom: 40px;
        }

        .banner {
            height: 250px;
            background: #333;
            width: 100%;
            object-fit: cover;
        }

        .station-meta-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
            position: relative;
            margin-top: -60px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: flex-end;
        }

        .station-avatar {
            width: 180px;
            height: 180px;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .station-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .station-info {
            flex: 1;
            padding-bottom: 10px;
        }

        .station-title {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
        }

        .station-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tag {
            background: #eee;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .subscribe-btn {
            background: var(--brand-orange);
            color: var(--white);
            border: 3px solid var(--black);
            padding: 12px 30px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 50px;
            box-shadow: 4px 4px 0px var(--black);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .subscribe-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--black);
        }

        /* --- Tabs --- */
        .station-nav {
            max-width: 1200px;
            margin: 30px auto 0;
            padding: 0 5%;
            display: flex;
            gap: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab-link {
            padding-bottom: 15px;
            text-decoration: none;
            color: #666;
            font-weight: 700;
            border-bottom: 3px solid transparent;
        }
        .tab-link.active {
            color: var(--black);
            border-color: var(--brand-orange);
        }

        /* --- Content Grid --- */
        .content-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .video-card {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: var(--black);
            transition: 0.2s;
        }
        .video-card:hover { transform: translateY(-4px); box-shadow: 4px 4px 0px var(--black); }

        .vid-thumb {
            height: 140px;
            background: #ddd;
            position: relative;
        }
        .vid-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .vid-duration {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .vid-info { padding: 15px; }
        .vid-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; line-height: 1.3; }
        .vid-meta { font-size: 0.8rem; color: #666; }

        /* --- Tiers / Sidebar --- */
        .sidebar h3 {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--black);
            display: inline-block;
        }

        .tier-card {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .tier-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; }
        .tier-price { color: var(--brand-orange); font-weight: 800; font-size: 1.2rem; margin-bottom: 15px; }
        .tier-perk { display: flex; gap: 8px; font-size: 0.9rem; margin-bottom: 8px; align-items: flex-start;}

        .btn-tier {
            width: 100%;
            padding: 10px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }
        .btn-tier:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <a href="../index.html" class="brand">VERTO<span>.</span></a>
            <div class="nav-menu">
                <a href="browse.html" class="nav-link">Discover</a>
                <a href="guide.html" class="nav-link">Guide</a>
                <a href="../community/community.html" class="nav-link">Community</a>
            </div>
            <div style="display:flex; gap:20px; align-items:center;">
                <a href="../studio/dashboard.html" style="color:var(--brand-orange); text-decoration:none; font-weight:700;">Studio</a>
                <a href="../billing/settings.html" style="color:var(--black); text-decoration:none; font-weight:700;">Account</a>
            </div>
        </nav>
    </div>

    <!-- Station Header -->
    <header class="station-header">
        <img src="" class="banner" alt="Banner" id="station-banner">
        
        <div class="station-meta-container">
            <div class="station-avatar">
                <img src="" alt="Avatar" id="station-avatar">
            </div>
            <div class="station-info">
                <h1 class="station-title" id="station-name">Loading...</h1>
                <div class="station-tags" id="station-tags"></div>
                <p style="max-width: 600px; line-height: 1.5;" id="station-bio"></p>
            </div>
            <div>
                <button class="subscribe-btn" id="subscribe-btn">Subscribe</button>
            </div>
        </div>

        <div class="station-nav">
            <a href="#" class="tab-link active">Videos</a>
            <a href="live.html" class="tab-link">Live</a>
            <a href="../community/station-forum.html" class="tab-link">Community</a>
            <a href="#" class="tab-link">About</a>
        </div>
    </header>

    <div class="content-container">
        
        <!-- Main Content (Videos) -->
        <div>
            <h3 style="font-weight:800; margin-bottom:20px;">Latest Uploads</h3>
            <div class="video-grid" id="video-grid">
                <p style="color:#999;padding:20px;">Loading videos...</p>
            </div>
        </div>

        <!-- Sidebar (Tiers) -->
        <div class="sidebar">
            <h3>Support the Station</h3>
            <p style="margin-bottom:20px; font-size:0.9rem; margin-top:10px;">Directly support this creator.</p>
            <div id="tiers-container">
                <p style="color:#999;">Loading tiers...</p>
            </div>
        </div>

    </div>

    <script src="/js/api.js"></script>
    <script>
        lucide.createIcons();

        const stationId = new URLSearchParams(window.location.search).get('id');
        if (!stationId) { window.location.href = '/discovery/browse.html'; }

        const defaultThumb = 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=600';

        async function loadStation() {
            try {
                const res = await api.get(`/stations/${stationId}`);
                const s = res.data;
                document.getElementById('station-name').textContent = s.name || s.stationName || 'Station';
                document.getElementById('station-bio').textContent = s.description || s.bio || '';
                if (s.bannerUrl) document.getElementById('station-banner').src = s.bannerUrl;
                if (s.avatarUrl) document.getElementById('station-avatar').src = s.avatarUrl;
                
                const tags = document.getElementById('station-tags');
                if (s.category) tags.innerHTML = `<span class="tag">${s.category}</span>`;

                // Videos
                const videos = s.recentVideos || [];
                const grid = document.getElementById('video-grid');
                if (videos.length) {
                    grid.innerHTML = videos.map(v => `
                        <a href="watch.html?id=${v._id}" class="video-card">
                            <div class="vid-thumb">
                                <img src="${v.thumbnailUrl || defaultThumb}" alt="Video">
                                ${v.durationSeconds ? `<span class="vid-duration">${Math.floor(v.durationSeconds/60)}:${String(v.durationSeconds%60).padStart(2,'0')}</span>` : ''}
                            </div>
                            <div class="vid-info">
                                <div class="vid-title">${v.title}</div>
                                <div class="vid-meta">${formatDate(v.createdAt)} • ${formatNumber(v.viewCount)} views</div>
                            </div>
                        </a>
                    `).join('');
                } else {
                    grid.innerHTML = '<p style="color:#999;">No videos yet</p>';
                }

                // Tiers
                const tiers = s.tiers || [];
                const container = document.getElementById('tiers-container');
                if (tiers.length) {
                    container.innerHTML = tiers.map((t, i) => `
                        <div class="tier-card" ${i === 1 ? 'style="border-color: var(--brand-orange); box-shadow: 6px 6px 0px var(--brand-orange);"' : ''}>
                            ${i === 1 ? '<div style="position:absolute; top:-12px; right:20px; background:var(--brand-orange); color:white; font-size:0.7rem; font-weight:800; padding:2px 8px; border-radius:4px;">POPULAR</div>' : ''}
                            <div class="tier-name">${t.name}</div>
                            <div class="tier-price">$${t.price} / ${t.billingPeriod || 'month'}</div>
                            ${(t.perks||[]).map(p => `<div class="tier-perk"><i data-lucide="check" size="16"></i> ${p}</div>`).join('')}
                            <button class="btn-tier" ${i === 1 ? 'style="background:var(--brand-orange);"' : ''} onclick="joinTier('${t._id}')">Join Tier</button>
                        </div>
                    `).join('');
                    lucide.createIcons();
                } else {
                    container.innerHTML = '<p style="color:#999;">No tiers available</p>';
                }
            } catch (err) {
                document.getElementById('station-name').textContent = 'Station not found';
            }
        }

        async function joinTier(tierId) {
            if (!auth.isLoggedIn()) { window.location.href = '/auth/sign-in.html'; return; }
            try {
                await api.post('/subscriptions', { tierId, paymentMethodId: 'demo_card' });
                showToast('Subscribed successfully!', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        loadStation();
    </script>
</body>
</html>
