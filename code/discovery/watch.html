<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Watch</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--black); /* Dark mode for cinema feeling */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Nav (Dark Mode Variant) --- */
        .nav-wrapper {
            padding: 20px 2%;
            background: var(--black);
            border-bottom: 1px solid #333;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -1px;
        }
        .brand span { color: var(--brand-orange); }

        .nav-controls {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 50px;
            transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--brand-orange); color: var(--black); }

        /* --- Player Layout --- */
        .theater-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            flex: 1;
            height: calc(100vh - 80px);
        }

        /* Left Side: Video */
        .main-stage {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            border: 2px solid #333;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .stream-info {
            padding: 0 10px;
        }
        .stream-title {
            color: var(--white);
            font-size: 1.5rem;
            font-family: 'Lora', serif;
            font-style: italic;
            margin-bottom: 10px;
        }
        
        .stream-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .creator-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .creator-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #eee;
        }
        .creator-btn {
            background: var(--brand-orange);
            color: var(--black);
            border: none;
            padding: 6px 16px;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Start Up Next */
        .up-next-list {
            margin-top: 20px;
        }
        .list-header {
            color: var(--white);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 800;
        }
        
        .next-card {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            transition: 0.2s;
        }
        .next-card:hover { opacity: 0.8; }

        .next-thumb {
            width: 160px;
            height: 90px;
            background: #333;
            border-radius: 8px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .next-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .next-info { flex: 1; }
        .next-title { color: var(--white); font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .next-meta { color: #666; font-size: 0.8rem; }


        /* Right Side: Chat */
        .chat-sidebar {
            background: #111;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px;
            color: var(--white);
            font-weight: 800;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #ccc;
        }
        .user-name {
            color: var(--brand-orange);
            font-weight: 700;
            margin-right: 6px;
        }
        .admin-badge {
            background: var(--white);
            color: var(--black);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-right: 5px;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #333;
            background: #111;
        }
        .chat-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            color: var(--white);
            outline: none;
        }
        .chat-input:focus { border-color: var(--brand-orange); }

        @media (max-width: 900px) {
            .theater-container { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .chat-sidebar { height: 400px; }
        }
    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <div style="display:flex; align-items:center; gap:20px;">
                <a href="../index.html" class="brand">VERTO<span>.</span></a>
                <a href="browse.html" class="nav-btn"><i data-lucide="arrow-left" size="18"></i> Back to Browse</a>
            </div>
            
            <div class="nav-controls">
                <a href="../studio/dashboard.html" class="nav-btn"><i data-lucide="layers" size="18"></i> Studio</a>
                <a href="../community/community.html" class="nav-btn"><i data-lucide="users" size="18"></i> Community</a>
                <a href="../billing/settings.html" class="nav-btn"><i data-lucide="user" size="18"></i> Account</a>
            </div>
        </nav>
    </div>

    <div class="theater-container">
        <!-- Main Stage -->
        <main class="main-stage">
            <div class="video-player" id="video-player">
                <div style="text-align:center;">
                    <i data-lucide="play-circle" size="64" style="margin-bottom:10px;"></i>
                    <p>Loading video...</p>
                </div>
            </div>

            <div class="stream-info">
                <h1 class="stream-title" id="video-title">Loading...</h1>
                <div class="stream-meta">
                    <div class="creator-row">
                        <div class="creator-avatar" id="creator-avatar">
                            <img src="" alt="Creator">
                        </div>
                        <div>
                            <div style="color:white; font-weight:700;" id="creator-name">—</div>
                            <div style="font-size:0.8rem;" id="creator-subs">— Subscribers</div>
                        </div>
                        <button class="creator-btn" id="subscribe-btn">Subscribe</button>
                    </div>
                    <div style="display:flex; gap:15px;">
                        <span><i data-lucide="eye" size="16" style="vertical-align:middle;"></i> <span id="view-count">0</span></span>
                        <span id="like-btn" style="cursor:pointer;"><i data-lucide="thumbs-up" size="16" style="vertical-align:middle;"></i> <span id="like-count">0</span></span>
                        <span><i data-lucide="share-2" size="16" style="vertical-align:middle;"></i> Share</span>
                    </div>
                </div>

                <!-- Comments -->
                <div class="up-next-list" id="comments-section">
                    <h3 class="list-header">Comments</h3>
                    <div id="comments-list"></div>
                    <div style="margin-top:16px;" id="comment-form-wrap"></div>
                </div>
            </div>
        </main>

        <!-- Chat Sidebar -->
        <aside class="chat-sidebar">
            <div class="chat-header">
                <span>Chat</span>
                <i data-lucide="more-horizontal"></i>
            </div>
            
            <div class="chat-messages" id="chat-messages">
            </div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Say something...">
            </div>
        </aside>
    </div>

    <script src="/js/api.js"></script>
    <script>
        lucide.createIcons();

        const videoId = new URLSearchParams(window.location.search).get('id');
        if (!videoId) { window.location.href = '/discovery/browse.html'; }

        // ── Load video ──
        async function loadVideo() {
            try {
                const res = await api.get(`/videos/${videoId}`);
                const v = res.data;
                document.getElementById('video-title').textContent = v.title;
                document.getElementById('view-count').textContent = formatNumber(v.viewCount);
                document.getElementById('like-count').textContent = formatNumber(v.likeCount);

                // Video player
                const player = document.getElementById('video-player');
                if (v.videoUrl) {
                    player.innerHTML = `<video controls autoplay style="width:100%;height:100%;object-fit:contain;background:#000;"><source src="${v.videoUrl}" type="video/mp4">Your browser does not support the video tag.</video>`;
                } else {
                    player.innerHTML = '<div style="text-align:center;padding:40px;"><p>Video not available</p></div>';
                }

                // Track view
                api.post(`/videos/${videoId}/view`).catch(() => {});
            } catch (err) {
                document.getElementById('video-title').textContent = 'Video not found';
            }
        }

        // ── Load comments ──
        async function loadComments() {
            try {
                const res = await api.get(`/videos/${videoId}/comments`);
                const comments = res.data?.comments || [];
                const list = document.getElementById('comments-list');
                list.innerHTML = comments.length ? comments.map(c => `
                    <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1);">
                        <div style="font-weight:700;font-size:0.85rem;">${c.authorId?.fullName || 'Anonymous'}</div>
                        <div style="font-size:0.9rem;margin-top:4px;">${c.text}</div>
                        <div style="font-size:0.75rem;color:#999;margin-top:4px;">${formatDate(c.createdAt)}</div>
                    </div>
                `).join('') : '<p style="color:#999;">No comments yet</p>';

                // Comment form
                if (auth.isLoggedIn()) {
                    document.getElementById('comment-form-wrap').innerHTML = `
                        <textarea id="comment-text" placeholder="Add a comment..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#1a1a1a;color:#fff;font-family:inherit;resize:vertical;min-height:60px;"></textarea>
                        <button id="post-comment-btn" style="margin-top:8px;padding:10px 24px;border-radius:100px;background:var(--brand-orange);color:#fff;font-weight:700;border:none;cursor:pointer;">Post Comment</button>
                    `;
                    document.getElementById('post-comment-btn').addEventListener('click', async () => {
                        const text = document.getElementById('comment-text').value.trim();
                        if (!text) return;
                        try {
                            await api.post(`/videos/${videoId}/comments`, { text });
                            showToast('Comment posted!', 'success');
                            loadComments();
                        } catch (err) { showToast(err.message, 'error'); }
                    });
                }
            } catch {}
        }

        // ── Like ──
        document.getElementById('like-btn').addEventListener('click', async () => {
            if (!auth.isLoggedIn()) { showToast('Sign in to like', 'warning'); return; }
            try {
                const res = await api.post(`/videos/${videoId}/like`);
                document.getElementById('like-count').textContent = formatNumber(res.data.likeCount);
                showToast(res.data.liked ? 'Liked!' : 'Unliked', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        });

        loadVideo();
        loadComments();
    </script>
</body>
</html>
