<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTO | Browse</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Lora:ital,wght@1,500;1,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF4D24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --soft-gray: #F8F8F8;
            --border-thick: 3px solid var(--black);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-gray);
            min-height: 100vh;
        }

        /* --- Nav --- */
        .nav-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            padding: 0 5%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 100px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .brand {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--black);
            text-decoration: none;
            letter-spacing: -2px;
        }
        .brand span { color: var(--brand-orange); }

        .nav-menu {
            display: flex;
            gap: 30px;
            font-weight: 700;
        }
        
        .nav-link {
            text-decoration: none;
            color: var(--black);
            font-size: 1rem;
        }
        .nav-link.active {
            color: var(--brand-orange);
            text-decoration: underline;
            text-decoration-thickness: 3px;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--black);
            overflow: hidden;
            border: 2px solid var(--black);
        }
        .user-avatar-small img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Hero Search --- */
        .browse-hero {
            padding: 60px 5% 40px;
            text-align: center;
        }
        
        .browse-hero h1 {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 0.9;
        }

        .search-bar {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 20px 60px 20px 25px;
            border: var(--border-thick);
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            box-shadow: 6px 6px 0px var(--black);
            transition: 0.2s;
        }
        .search-bar input:focus {
            transform: translateY(-2px);
            box-shadow: 8px 8px 0px var(--black);
        }
        
        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--black);
        }

        /* --- Categories --- */
        .category-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px 5%;
            margin-bottom: 40px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-chip {
            background: var(--white);
            border: 2px solid var(--black);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: var(--black);
        }
        .cat-chip:hover, .cat-chip.active {
            background: var(--black);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* --- Grid Layout --- */
        .section-container {
            padding: 0 5%;
            margin-bottom: 60px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }
        
        .section-header h2 {
            font-size: 2rem;
            font-family: 'Lora', serif;
            font-style: italic;
        }
        
        .section-link {
            font-weight: 700;
            color: var(--brand-orange);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* --- Station Card --- */
        .station-card {
            background: var(--white);
            border: var(--border-thick);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.2s;
            display: block;
            text-decoration: none;
            color: var(--black);
            height: 100%;
        }

        .station-card:hover {
            transform: translateY(-6px);
            box-shadow: 10px 10px 0px var(--black);
        }

        .card-thumb {
            height: 180px;
            background: #eee;
            border-bottom: var(--border-thick);
            position: relative;
        }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: red;
            color: white;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 2px solid var(--black);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        
        .card-sub {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            font-size: 0.75rem;
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* --- Bundle Card (Mega) --- */
        .bundle-card {
            background: var(--black);
            color: var(--white);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 350px;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .bundle-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .bundle-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: 0.3s;
        }

        .bundle-card:hover { transform: scale(1.02); }
        .bundle-card:hover .bundle-bg { opacity: 0.4; transform: scale(1.05); }

        .bundle-info {
            position: relative;
            z-index: 2;
        }

        .bundle-label {
            background: var(--brand-orange);
            color: var(--white);
            display: inline-block;
            padding: 4px 12px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .bundle-title {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 2rem;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <a href="../index.html" class="brand">VERTO<span>.</span></a>
            
            <div class="nav-menu">
                <a href="browse.html" class="nav-link active">Discover</a>
                <a href="guide.html" class="nav-link">Guide</a>
                <a href="../community/community.html" class="nav-link">Community</a>
            </div>

            <div class="nav-user">
                <a href="../studio/dashboard.html" style="color:var(--brand-orange); text-decoration:none; font-weight:800;">Studio</a>
                <a href="../billing/settings.html" style="color:var(--black); text-decoration:none;">Account</a>
                 <div class="user-avatar-small">
                    <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&q=80&w=100" alt="User">
                </div>
            </div>
        </nav>
    </div>

    <!-- Hero Search -->
    <div class="browse-hero">
        <h1>Find Your Frequency</h1>
        <div class="search-bar">
            <input type="text" placeholder="Search creators, bundles, or tags...">
            <i data-lucide="search" class="search-icon"></i>
        </div>
    </div>

    <!-- Categories -->
    <div class="category-scroll" id="categories-bar">
        <a href="#" class="cat-chip active" data-category="">All</a>
    </div>

    <!-- Live Now -->
    <div class="section-container">
        <div class="section-header">
            <h2>Live Now</h2>
            <a href="guide.html" class="section-link">View Full Guide <i data-lucide="arrow-right" size="16"></i></a>
        </div>
        <div class="card-grid" id="live-grid">
            <p style="color:#999;padding:20px;">Loading live streams...</p>
        </div>
    </div>

    <!-- Trending Videos -->
    <div class="section-container">
        <div class="section-header">
            <h2>Trending Videos</h2>
        </div>
        <div class="card-grid" id="videos-grid">
            <p style="color:#999;padding:20px;">Loading videos...</p>
        </div>
    </div>

    <!-- Featured Bundles -->
    <div class="section-container">
        <div class="section-header">
            <h2>Curated Collections</h2>
        </div>
        <div class="card-grid" id="bundles-grid" style="grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));">
            <p style="color:#999;padding:20px;">Loading bundles...</p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        lucide.createIcons();

        const defaultThumb = 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=600';

        // ── Load categories ──
        async function loadCategories() {
            try {
                const res = await api.get('/discover/categories');
                const bar = document.getElementById('categories-bar');
                (res.data || []).forEach(c => {
                    const a = document.createElement('a');
                    a.href = '#';
                    a.className = 'cat-chip';
                    a.dataset.category = c.name;
                    a.textContent = c.name;
                    bar.appendChild(a);
                });
                // Chip click handler
                bar.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('cat-chip')) return;
                    e.preventDefault();
                    bar.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    loadVideos(e.target.dataset.category);
                });
            } catch {}
        }

        // ── Load live streams ──
        async function loadLive() {
            try {
                const res = await api.get('/streams/live');
                const grid = document.getElementById('live-grid');
                const streams = res.data || [];
                if (!streams.length) { grid.innerHTML = '<p style="color:#999;padding:20px;">No live streams right now</p>'; return; }
                grid.innerHTML = streams.map(s => `
                    <a href="live.html?id=${s._id}" class="station-card">
                        <div class="card-thumb">
                            <span class="live-badge">Live</span>
                            <img src="${s.thumbnailUrl || defaultThumb}" alt="Stream">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${s.title}</div>
                            <div class="card-sub">${formatNumber(s.viewerCount)} watching</div>
                        </div>
                    </a>
                `).join('');
            } catch { document.getElementById('live-grid').innerHTML = '<p style="color:#999;padding:20px;">Could not load streams</p>'; }
        }

        // ── Load videos ──
        async function loadVideos(category) {
            try {
                const q = category ? `?category=${encodeURIComponent(category)}` : '';
                const res = await api.get(`/videos${q}`);
                const grid = document.getElementById('videos-grid');
                const videos = res.data || [];
                if (!videos.length) { grid.innerHTML = '<p style="color:#999;padding:20px;">No videos found</p>'; return; }
                grid.innerHTML = videos.map(v => `
                    <a href="watch.html?id=${v._id}" class="station-card">
                        <div class="card-thumb">
                            <img src="${v.thumbnailUrl || defaultThumb}" alt="${v.title}">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${v.title}</div>
                            <div class="card-sub">${formatNumber(v.viewCount)} views</div>
                            <div class="tag-list">
                                ${(v.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </a>
                `).join('');
            } catch { document.getElementById('videos-grid').innerHTML = '<p style="color:#999;padding:20px;">Could not load videos</p>'; }
        }

        // ── Load bundles ──
        async function loadBundles() {
            try {
                const res = await api.get('/bundles');
                const grid = document.getElementById('bundles-grid');
                const bundles = res.data || [];
                if (!bundles.length) { grid.innerHTML = '<p style="color:#999;padding:20px;">No bundles yet</p>'; return; }
                grid.innerHTML = bundles.map(b => `
                    <a href="bundle.html?id=${b._id}" class="bundle-card">
                        <img src="${b.coverImageUrl || defaultThumb}" class="bundle-bg">
                        <div class="bundle-info">
                            <span class="bundle-label">$${b.price}/${b.billingPeriod || 'monthly'}</span>
                            <h3 class="bundle-title">${b.name}</h3>
                            <p>${b.description || ''}</p>
                        </div>
                    </a>
                `).join('');
            } catch { document.getElementById('bundles-grid').innerHTML = '<p style="color:#999;padding:20px;">Could not load bundles</p>'; }
        }

        // ── Search ──
        const searchInput = document.querySelector('.search-bar input');
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const q = searchInput.value.trim();
                if (!q) { loadVideos(); return; }
                try {
                    const res = await api.get(`/videos?q=${encodeURIComponent(q)}`);
                    const grid = document.getElementById('videos-grid');
                    const videos = res.data || [];
                    grid.innerHTML = videos.length ? videos.map(v => `
                        <a href="watch.html?id=${v._id}" class="station-card">
                            <div class="card-thumb"><img src="${v.thumbnailUrl || defaultThumb}" alt="${v.title}"></div>
                            <div class="card-content">
                                <div class="card-title">${v.title}</div>
                                <div class="card-sub">${formatNumber(v.viewCount)} views</div>
                            </div>
                        </a>
                    `).join('') : '<p style="color:#999;padding:20px;">No results found</p>';
                } catch {}
            }, 400);
        });

        // ── Init ──
        loadCategories();
        loadLive();
        loadVideos();
        loadBundles();
    </script>
</body>
</html>
